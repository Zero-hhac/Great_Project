{{define "article-edit"}}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑文章 - 个人博客</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="/" class="logo">
                <span class="logo-icon">✦</span> 个人博客
            </a>
            <div class="nav-links">
                <a href="/" class="nav-item">首页</a>
                <a href="/articles" class="nav-item">文章</a>
                <a href="/articles/create" class="nav-item">写文章</a>
                <a href="/profile" class="nav-item">个人信息</a>
                <span class="welcome-badge">欢迎，{{.nickname}}</span>
                <form action="/logout" method="post" style="display:inline">
                    <button type="submit" class="btn-logout">退出</button>
                </form>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <div class="home-layout">
            <!-- 左侧：个人信息面板 -->
            {{template "sidebar" .}}

            <!-- 右侧：编辑文章 -->
            <section class="content-area">
                <div class="create-page">
                    <h2 class="section-main-title">编辑文章</h2>
                    {{if .error}}
                    <div class="alert alert-error">{{.error}}</div>
                    {{end}}
                    <form action="/articles/edit/{{.article.ID}}" method="post" class="article-form">
                        <div class="form-group">
                            <label for="title">标题</label>
                            <input type="text" id="title" name="title" value="{{.article.Title}}" required placeholder="请输入文章标题">
                        </div>
                        <div class="form-group">
                            <label for="content">内容 <small>(支持 Markdown 格式)</small></label>
                            <textarea id="content" name="content" rows="20" required placeholder="在这里写下你的内容...">{{.article.Content}}</textarea>
                        </div>
                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary">保存修改</button>
                            <a href="/articles/{{.article.ID}}" class="btn btn-outline">取消</a>
                        </div>
                    </form>
                </div>
            </section>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 个人博客 - 使用 Go + Gin 构建</p>
        </div>
    </footer>
</body>
</html>
{{end}}
